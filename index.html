<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
</head>
<body style="background:#111;margin:0">
<script src="js/assets.js"></script>
<script src="js/input.js"></script>
<script>
  window.onload = function(){
    loadAllAssets().then(function(){
      console.log('Assets OK - Total:', Object.keys(IMGS).length);
      setInterval(function(){
        INPUT._updateKeyboard();
        if(INPUT.left)  console.log('← esquerda');
        if(INPUT.right) console.log('→ direita');
        if(INPUT.down)  console.log('↓ agachar');
        if(INPUT.fire)  console.log('● atirar');
        if(INPUT.jumpPressed){ console.log('▲ PULO!'); INPUT.clearJump(); }
      }, 100);
    });
  };
</script>
</body>
</html>
