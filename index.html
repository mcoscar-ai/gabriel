<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; touch-action:none; }
    canvas{ display:block; image-rendering:auto; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="js/assets.js"></script>
<script src="js/input.js"></script>
<script src="js/player.js"></script>
<script src="js/renderer.js"></script>
<script src="js/enemies.js"></script>
<script src="js/hud.js"></script>
<script>
  var C = document.getElementById('c');
  var X = C.getContext('2d');
  var W = 800, H = 400;
  C.width = W; C.height = H;

  function resize(){
    var scale = Math.min(window.innerWidth/W, window.innerHeight/H);
    C.style.width  = Math.floor(W * scale) + 'px';
    C.style.height = Math.floor(H * scale) + 'px';
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function(){ setTimeout(resize, 200); });

  loadAllAssets().then(function(){
    spawnEnemies();
    function loop(){
      requestAnimationFrame(loop);
      // Render cenário
      renderScene(X, W, H);
      // Colisão balas do player com inimigos
      for(var i = BULLETS.length-1; i>=0; i--){
        var b = BULLETS[i];
        for(var j = 0; j < ENEMIES.length; j++){
          var e = ENEMIES[j];
          if(e.state === STATE_DEAD) continue;
          if(b.x+b.w > e.x && b.x < e.x+e.w &&
             b.y+b.h > e.y && b.y < e.y+e.h){
            hitEnemy(e);
            BULLETS.splice(i,1);
            break;
          }
        }
      }
      updatePlayer();
      updateEnemies();
      drawEnemies(X);
      drawPlayer(X);
      drawBullets(X);
      drawHUD(X, W, H);
    }
    loop();
  });
</script>
</body>
</html>
