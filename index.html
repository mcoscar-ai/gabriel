<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; touch-action:none; }
    canvas{ display:block; image-rendering:pixelated; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="js/assets.js"></script>
<script src="js/input.js"></script>
<script src="js/player.js"></script>
<script src="js/renderer.js"></script>
<script>
  var C = document.getElementById('c');
  var X = C.getContext('2d');
  var W = 800, H = 400;
  C.width = W; C.height = H;
  function resize(){
    var scaleX = window.innerWidth  / W;
    var scaleY = window.innerHeight / H;
    var scale  = Math.min(scaleX, scaleY);
    C.style.width  = Math.floor(W * scale) + 'px';
    C.style.height = Math.floor(H * scale) + 'px';
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function(){ setTimeout(resize, 200); });
  loadAllAssets().then(function(){
    function loop(){
      requestAnimationFrame(loop);
      X.clearRect(0, 0, W, H);
      drawScene(X);
      updatePlayer();
      drawPlayer(X);
      drawBullets(X);
      X.fillStyle = '#fff';
      X.font = '14px monospace';
      X.fillText('Vidas: ' + P.lives + '  Score: ' + P.score, 10, 20);
    }
    loop();
  });
</script>
</body>
</html>
