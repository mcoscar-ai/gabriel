<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gabriel: Shadow Circuit</title>
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; touch-action:none; }
    canvas{ display:block; image-rendering:auto; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="js/assets.js"></script>
<script src="js/input.js"></script>
<script src="js/player.js"></script>
<script src="js/renderer.js"></script>
<script src="js/enemies.js"></script>
<script src="js/hud.js"></script>
<script src="js/screens.js"></script>
<script src="js/game.js"></script>
<script>
  var C = document.getElementById('c');
  var X = C.getContext('2d');
  var W = 800, H = 400;
  C.width = W; C.height = H;

  function resize(){
    var scale = Math.min(window.innerWidth/W, window.innerHeight/H);
    C.style.width  = Math.floor(W * scale) + 'px';
    C.style.height = Math.floor(H * scale) + 'px';
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function(){ setTimeout(resize, 200); });

  loadAllAssets().then(function(){
    spawnEnemies();
    spawnServers();
    function loop(){
      requestAnimationFrame(loop);
      gameLoop(X, W, H);
    }
    loop();
  });
</script>
</body>
</html>
